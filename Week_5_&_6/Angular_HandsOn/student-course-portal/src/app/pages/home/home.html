<h1>{{ portalName }}</h1>

<p>
  Welcome to the Student Course Portal.
</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search Course">

<p>Searching for: {{ searchTerm }}</p>

<br>

<p><b>Courses Available:</b> {{ coursesCount }}</p>

<app-course-summary-widget></app-course-summary-widget>


<!--
[property]  -> One-way binding (Component → DOM)

[(ngModel)] -> Two-way binding (DOM ↔ Component)
-->
