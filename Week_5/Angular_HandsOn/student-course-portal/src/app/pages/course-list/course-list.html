<input
  type="text"
  [(ngModel)]="searchTerm"
  (input)="updateSearch()"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<app-course-card
  *ngFor="let course of (courses$ | async); trackBy: trackByCourseId"
  [course]="course"
  (enrollRequested)="onEnroll($event)">
</app-course-card>

<p *ngIf="selectedCourseId">
  Selected Course ID: {{ selectedCourseId }}
</p>
